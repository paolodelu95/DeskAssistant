<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desk Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
      margin-right: 20px;
      display: none;
    }

    .weather-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-top: 20px;
      width: 300px;
      text-align: center;
    }

    input,
    button {
      padding: 10px;
      margin: 5px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      background: #007e9e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>
  <div id="Settings" class ="settings">
    <button onclick="toggleSettings()">Set City</button>
  </div>
  <h1>Desk Assistant</h1>

  <div id="headerRow" class="header-row" style="display:block;">
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button onclick="getWeather()">Select city</button>
  </div>

  <div id="weatherResult" class="weather-card" style="display:none;">
    <h2 id="cityName"></h2>
    <p><strong>Temperature:</strong> <span id="temperature"></span>°C</p>
    <p><strong>Wind Speed:</strong> <span id="windSpeed"></span> km/h</p>
    <p><strong>Description:</strong> <span id="weatherDescription"></span></p>
    <p><span id="icon"></span></p>
  </div>

  <script>
    async function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) {
        alert("Please enter a city name.");
        return;
      }

      try {
        // Step 1: Get coordinates from city name
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
        const geoData = await geoRes.json();

        if (!geoData.results || geoData.results.length === 0) {
          alert("City not found.");
          return;
        }

        const { latitude, longitude, name, country } = geoData.results[0];

        // Step 2: Get weather data
        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
        const weatherData = await weatherRes.json();

        const { temperature, windspeed, weathercode } = weatherData.current_weather;
        const weatherDescription = getWeatherDescriptionFromCode(weathercode);

        // Step 3: Display results
        document.getElementById('cityName').textContent = `${name}, ${country}`;
        document.getElementById('temperature').textContent = temperature;
        document.getElementById('windSpeed').textContent = windspeed;
        document.getElementById('weatherDescription').textContent = weatherDescription;
        document.getElementById('icon').textContent = getEmojiForWeather(weatherDescription); // Placeholder for emoji

        document.getElementById('weatherResult').style.display = 'block';
        document.getElementById('headerRow').style.display = 'none';
        document.getElementById('Settings').style.display = 'block';

      } catch (error) {
        console.error(error);
        alert("Error fetching weather data.");
      }
    }
    function getWeatherDescriptionFromCode(weatherCode) {
      const weatherCodes = {
        0: "Clear sky",
        1: "Mainly clear",
        2: "Partly cloudy",
        3: "Overcast",
        45: "Fog",
        48: "Depositing rime fog",
        51: "Light drizzle",
        53: "Moderate drizzle",
        55: "Dense drizzle",
        56: "Light freezing drizzle",
        57: "Dense freezing drizzle",
        61: "Slight rain",
        63: "Moderate rain",
        65: "Heavy rain",
        66: "Light freezing rain",
        67: "Heavy freezing rain",
        71: "Slight snow fall",
        73: "Moderate snow fall",
        75: "Heavy snow fall",
        77: "Snow grains",
        80: "Slight rain showers",
        81: "Moderate rain showers",
        82: "Violent rain showers",
        85: "Slight snow showers",
        86: "Heavy snow showers"
      };
      return weatherCodes[weatherCode] || "Unknown weather code";
    }
    function toggleSettings() {
      const settings = document.getElementById('Settings');
      const headerRow = document.getElementById('headerRow');
      const weatherResult = document.getElementById('weatherResult');

      if (settings.style.display === 'none') {
        settings.style.display = 'none';
        headerRow.style.display = 'none';
        weatherResult.style.display = 'flex';
      } else {
        settings.style.display = 'none';
        headerRow.style.display = 'flex';
        weatherResult.style.display = 'none';
      }
    }
    function getEmojiForWeather(description) {
      const emojiMap = {
        "Clear sky": "☀️",
        "Mainly clear": "🌤️",
        "Partly cloudy": "⛅",
        "Overcast": "☁️",
        "Fog": "🌫️",
        "Depositing rime fog": "🌫️",
        "Light drizzle": "🌦️",
        "Moderate drizzle": "🌧️",
        "Dense drizzle": "🌧️",
        "Light freezing drizzle": "🌧️❄️",
        "Dense freezing drizzle": "🌧️❄️",
        "Slight rain": "🌧️",
        "Moderate rain": "🌧️",
        "Heavy rain": "🌧️",
        "Light freezing rain": "🌧️❄️",
        "Heavy freezing rain": "🌧️❄️",
        "Slight snow fall": "❄️",
        "Moderate snow fall": "❄️",
        "Heavy snow fall": "❄️",
        "Snow grains": "❄️",
        "Slight rain showers": "🌦️",
        "Moderate rain showers": "🌧️",
        "Violent rain showers": "⛈️",
        "Slight snow showers": "❄️",
        "Heavy snow showers": "❄️"
      };
      return emojiMap[description] || "";
    }
  </script>

</body>

</html>
